<svg width="860" height="200" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="35%" style="stop-color:#f472b6"/>
      <stop offset="70%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#facc15"/>
    </linearGradient>
    <filter id="nameGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="url(#bgGrad)" rx="16"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="white" stroke-width="0.5">
    <line x1="0" y1="20" x2="860" y2="20"/>
    <line x1="0" y1="40" x2="860" y2="40"/>
    <line x1="0" y1="60" x2="860" y2="60"/>
    <line x1="0" y1="80" x2="860" y2="80"/>
    <line x1="0" y1="100" x2="860" y2="100"/>
    <line x1="0" y1="120" x2="860" y2="120"/>
    <line x1="0" y1="140" x2="860" y2="140"/>
    <line x1="0" y1="160" x2="860" y2="160"/>
    <line x1="0" y1="180" x2="860" y2="180"/>
    <line x1="20" y1="0" x2="20" y2="200"/>
    <line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="220" y1="0" x2="220" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="260" y1="0" x2="260" y2="200"/>
    <line x1="280" y1="0" x2="280" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="340" y1="0" x2="340" y2="200"/>
    <line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="380" y1="0" x2="380" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="420" y1="0" x2="420" y2="200"/>
    <line x1="440" y1="0" x2="440" y2="200"/>
    <line x1="460" y1="0" x2="460" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="520" y1="0" x2="520" y2="200"/>
    <line x1="540" y1="0" x2="540" y2="200"/>
    <line x1="560" y1="0" x2="560" y2="200"/>
    <line x1="580" y1="0" x2="580" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="620" y1="0" x2="620" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
    <line x1="660" y1="0" x2="660" y2="200"/>
    <line x1="680" y1="0" x2="680" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
    <line x1="720" y1="0" x2="720" y2="200"/>
    <line x1="740" y1="0" x2="740" y2="200"/>
    <line x1="760" y1="0" x2="760" y2="200"/>
    <line x1="780" y1="0" x2="780" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
    <line x1="820" y1="0" x2="820" y2="200"/>
    <line x1="840" y1="0" x2="840" y2="200"/>
  </g>

  <!-- Ambient glows -->
  <ellipse cx="150" cy="100" rx="100" ry="60" fill="rgba(167,139,250,0.07)"/>
  <ellipse cx="710" cy="100" rx="100" ry="60" fill="rgba(58,134,255,0.06)"/>
  <ellipse cx="430" cy="160" rx="130" ry="45" fill="rgba(244,114,182,0.05)"/>

  <!-- Floating emojis with animation -->
  <text x="52" y="65" font-size="22" opacity="0.75">☕
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="3.5s" repeatCount="indefinite"/>
  </text>

  <text x="130" y="130" font-size="20" opacity="0.65">🚀
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-7;0,0" dur="4s" begin="0.5s" repeatCount="indefinite"/>
  </text>

  <text x="760" y="55" font-size="22" opacity="0.7">⚡
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-9;0,0" dur="3.2s" begin="1s" repeatCount="indefinite"/>
  </text>

  <text x="800" y="140" font-size="20" opacity="0.65">🌸
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-7;0,0" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
  </text>

  <text x="430" y="38" font-size="18" opacity="0.6">✨
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="2.8s" begin="0.7s" repeatCount="indefinite"/>
  </text>

  <text x="680" y="170" font-size="20" opacity="0.6">💡
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="3.8s" begin="1.2s" repeatCount="indefinite"/>
  </text>

  <!-- Main Name -->
  <text
          x="430" y="112"
          text-anchor="middle"
          font-family="'Arial Black', 'Arial Bold', sans-serif"
          font-weight="900"
          font-size="72"
          letter-spacing="6"
          fill="url(#nameGrad)"
          filter="url(#nameGlow)"
  >JEON YUJIN</text>

  <!-- Sub title -->
  <text
          x="430" y="140"
          text-anchor="middle"
          font-family="'Courier New', monospace"
          font-size="13"
          fill="rgba(255,255,255,0.55)"
          letter-spacing="5"
  >— backend engineer —</text>

  <!-- Tags -->
  <!-- MSA tag -->
  <rect x="282" y="153" width="56" height="24" rx="12" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.45)" stroke-width="1"/>
  <text x="310" y="169" text-anchor="middle" font-family="'Arial', sans-serif" font-weight="700" font-size="11" fill="#a78bfa" letter-spacing="1">MSA</text>

  <!-- DDD tag -->
  <rect x="348" y="153" width="56" height="24" rx="12" fill="rgba(244,114,182,0.15)" stroke="rgba(244,114,182,0.45)" stroke-width="1"/>
  <text x="376" y="169" text-anchor="middle" font-family="'Arial', sans-serif" font-weight="700" font-size="11" fill="#f472b6" letter-spacing="1">DDD</text>

  <!-- System Design tag -->
  <rect x="414" y="153" width="122" height="24" rx="12" fill="rgba(251,146,60,0.15)" stroke="rgba(251,146,60,0.45)" stroke-width="1"/>
  <text x="475" y="169" text-anchor="middle" font-family="'Arial', sans-serif" font-weight="700" font-size="11" fill="#fb923c" letter-spacing="1">SYSTEM DESIGN</text>

</svg>